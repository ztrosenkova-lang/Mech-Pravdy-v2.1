buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 26
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.8.22"
    }
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
        
        // СТРОГИЙ ЗАКОН СБОРКИ REACT NATIVE:
        // Указываем компилятору искать плагин локально в node_modules на диске,
        // чтобы он мгновенно считал версию 0.73.0 без обращения к удаленным серверам!
        maven { url "${rootDir}/../node_modules/react-native/android" }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.1'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}"
        classpath "com.facebook.react:react-native-gradle-plugin:0.73.0"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}
