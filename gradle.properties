android.useAndroidX=true
android.enableJetifier=true

# Выделяем оперативную память для компиляции тяжелого C++ кода llama.cpp в CI
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# Отключаем строгое превращение предупреждений в ошибки компиляции Kotlin
kotlin.warnings.as.errors=false

# АКТИВАЦИЯ НОВОЙ АРХИТЕКТУРЫ ДЛЯ REACT NATIVE 0.73
newArchEnabled=true

# ФИКСАЦИЯ ПУТЕЙ ДЛЯ CMAKE: Указываем плагину точное расположение node_modules.
# Это исправит ошибку "include could not find requested file" в CMakeLists.txt
reactNativeDir=$rootDir/react-native-brain/node_modules/react-native
