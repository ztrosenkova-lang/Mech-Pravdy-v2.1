buildscript {
    // Явно указываем Gradle-системе, где физически находится ядро React Android
    System.setProperty("REACT_ANDROID_DIR", "${projectDir}/react-native-brain/node_modules/react-native/ReactAndroid")
    
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.3'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21'
        
        // Добавляем класс-путь к плагину React Native, чтобы подмодуль Llama его нашел!
        classpath("com.facebook.react:react-native-gradle-plugin")
    }
    
    configurations.all {
        resolutionStrategy.eachDependency { DependencyResolveDetails details ->
            if (details.requested.group == 'org.jetbrains.kotlin') {
                details.useVersion '2.0.21'
            }
        }
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    
    // Автоматически прописываем compileSdkVersion для подмодуля Llama, 
    // чтобы исправить ошибку "compileSdkVersion is not specified"
    afterEvaluate { project ->
        if (project.name == 'pocketpalai_llama.rn') {
            project.android {
                compileSdkVersion 34
                buildToolsVersion "34.0.0"
                defaultConfig {
                    minSdkVersion 21
                    targetSdkVersion 34
                }
            }
        }
    }
}
