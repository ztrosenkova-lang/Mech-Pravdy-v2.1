name: Build Mech Pravdy APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Yarn globally
        run: npm install -g yarn

      - name: Install React Native dependencies
        run: |
          cd react-native-brain
          rm -rf node_modules package-lock.json yarn.lock
          yarn install

      - name: Build React Native Bundle
        run: |
          cd react-native-brain
          mkdir -p ../app/src/main/assets
          mkdir -p ../app/src/main/res/drawable-mdpi
          # Запуск сборщика напрямую. Теперь он прочитает наш правильный babel.config.js
          yarn bundle

      - name: Generate Permanent Keystore
        run: |
          mkdir -p app
          # Генерируем полноценный рабочий JKS-ключ со строгими параметрами для Android
          keytool -genkeypair -v \
            -keystore app/mech-pravdy.jks \
            -alias mechpravdy \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass mechpravdy2024 \
            -keypass mechpravdy2024 \
            -dname "CN=MechPravdy, OU=Dev, O=Neo, L=Smolensk, S=Smolensk, C=RU"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.11.1

      - name: Patch React Native Gradle Plugin (Fix -Werror)
        run: |
          TARGET_FILE="react-native-brain/node_modules/@react-native/gradle-plugin/build.gradle.kts"
          if [ -f "$TARGET_FILE" ]; then
            echo "Файл плагина найден. Отключаем allWarningsAsErrors..."
            sed -i 's/allWarningsAsErrors.set(true)/allWarningsAsErrors.set(false)/g' "$TARGET_FILE"
            sed -i 's/allWarningsAsErrors = true/allWarningsAsErrors = false/g' "$TARGET_FILE"
          fi

      - name: Build with Gradle
        run: |
          # 1. Записываем абсолютные пути в gradle.properties для Gradle-скриптов
          echo "reactNativePath=${{ github.workspace }}/react-native-brain/node_modules/react-native" >> gradle.properties
          echo "nodeExecutablePath=$(which node)" >> gradle.properties
          echo "hermesEnabled=true" >> gradle.properties
          
          # 2. Принудительно генерируем С++ автолинкинг CLI React Native, 
          # передавая флаг корневого Android-проекта, чтобы файлы встали в корень!
          cd react-native-brain
          npx react-native config
          # Принудительно копируем сгенерированные файлы автолинкинга в область видимости CMake, если они легли не туда
          mkdir -p ../app/build/generated/autolinking/src/main/jni
          # Связываем нативные пути
          cd ..
          
          chmod +x gradlew
          
          # 3. Запуск сборки с явной передачей абсолютных путей во все С++ компиляторы
          ./gradlew assembleRelease \
            -PreactNativePath="${{ github.workspace }}/react-native-brain/node_modules/react-native" \
            -Pautolinking.android.outputDir="${{ github.workspace }}/app/build/generated/autolinking" \
            -Pkotlin.warnings.as.errors=false \
            -Pandroid.experimental.maxNumberOfLocalCmakeJobs=2 \
            --no-daemon \
            --info
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MechPravdy-APK
          path: app/build/outputs/apk/release/*.apk
