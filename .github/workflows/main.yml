name: Build Mech Pravdy APK

on:
  workflow_dispatch: # Запуск строго вручную по кнопке

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          cache-dependency-path: package.json # ЗАВОД: Кэш привязан к корневому файлу

      - name: Install React Native dependencies
        run: |
          # ЗАВОД: Очистка и чистая установка пакетов прямо в корне репозитория
          rm -rf node_modules package-lock.json yarn.lock
          yarn cache clean
          yarn install --no-lockfile

      - name: Generate Permanent Keystore
        run: |
          # ЗАВОД: Ключ подписи генерируется внутри нативной папки приложения
          mkdir -p app
          keytool -genkeypair -v \
            -keystore app/mech-pravdy.jks \
            -alias mechpravdy \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass mechpravdy2024 \
            -keypass mechpravdy2024 \
            -dname "CN=MechPravdy, OU=Dev, O=Neo, L=Smolensk, S=Smolensk, C=RU"

      - name: Build React Native Bundle
        run: |
          # ЗАВОД: Запуск Metro Bundler из корня. Бандл укладывается на свое законное место
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/drawable-mdpi
          yarn bundle --platform android --dev false --entry-file index.js --bundle-output app/src/main/assets/index.android.bundle --assets-dest app/src/main/res

      - name: Build with Gradle
        run: |
          # ЗАВОД: Все нативные переменные пишутся в свойства без хакерских абсолютных путей
          echo "reactNativePath=${{ github.workspace }}/node_modules/react-native" >> gradle.properties
          echo "nodeExecutablePath=$(which node)" >> gradle.properties
          
          chmod +x gradlew
          # Команда компиляции запускается прямо из корня, так как Gradle-wrapper лежит здесь же
          ./gradlew assembleRelease \
            -PreactNativePath="${{ github.workspace }}/node_modules/react-native" \
            -Pkotlin.warnings.as.errors=false \
            -Pandroid.experimental.maxNumberOfLocalCmakeJobs=2 \
            --no-daemon \
            --info

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MechPravdy-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
