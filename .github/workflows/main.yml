name: Build Mech Pravdy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin', cache: 'gradle'}
      - uses: actions/setup-node@v4
        with: {node-version: '18'}
        
      - run: yarn install --no-lockfile
      
      - name: Generate Permanent Keystore
        run: |
          # ИСПРАВЛЕНИЕ: Генерируем ключ строго внутри физической нативной папки android/app
          mkdir -p android/app
          keytool -genkeypair -v \
            -keystore android/app/mech-pravdy.jks \
            -alias mechpravdy \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass mechpravdy2024 \
            -keypass mechpravdy2024 \
            -dname "CN=MechPravdy, OU=Dev, O=Neo, L=Smolensk, S=Smolensk, C=RU"

      - name: Build Bundle & APK
        run: |
          mkdir -p android/app/src/main/assets
          ./node_modules/.bin/react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
      - uses: actions/upload-artifact@v4
        with: {name: MechPravdy-APK, path: android/app/build/outputs/apk/release/*.apk}
