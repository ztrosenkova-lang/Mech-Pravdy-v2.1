name: Build Mech Pravdy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin', cache: 'gradle'}
      - uses: actions/setup-node@v4
        with: {node-version: '18'}
        
      - run: yarn install --no-lockfile
      - name: Build Bundle & APK
        run: |
          # 1. ЗАВОД: Физически перемещаем папку приложения app внутрь папки android,
          # чтобы структура на 100% соответствовала эталону React Native!
          mv app android/app
          
          # 2. Создаем папки ресурсов внутри уже переехавшего приложения
          mkdir -p android/app/src/main/assets
          
          # 3. Запуск сборщика Metro из корня проекта для упаковки оверлея
          ./node_modules/.bin/react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
          
          # 4. ЗАВОДСКОЙ СТАНДАРТ СБОРКИ:
          # Переходим в нативную папку android и запускаем чистую компиляцию
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
      - uses: actions/upload-artifact@v4
        with: {name: MechPravdy-APK, path: android/app/build/outputs/apk/release/*.apk}
