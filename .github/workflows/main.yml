name: Build Mech Pravdy APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Yarn globally
        run: npm install -g yarn

      - name: Install React Native dependencies
        run: |
          cd react-native-brain
          rm -rf node_modules package-lock.json yarn.lock
          yarn install

      - name: Build React Native Bundle
        run: |
          cd react-native-brain
          mkdir -p ../app/src/main/assets
          mkdir -p ../app/src/main/res/drawable-mdpi
          # Запуск сборщика напрямую. Теперь он прочитает наш правильный babel.config.js
          yarn bundle

      - name: Generate keystore
        run: |
          keytool -genkeypair -v -keystore app/mechpravdy.keystore \
          -alias mechpravdy -keyalg RSA -keysize 2048 \
          -validity 365 -storepass mechpravdy2024 \
          -keypass mechpravdy2024 \
          -dname "CN=MechPravdy, OU=Mech, O=MechPravdy, L=Smolensk, S=Smolensk, C=RU"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.11.1

      - name: Patch React Native Gradle Plugin (Fix -Werror)
        run: |
          TARGET_FILE="react-native-brain/node_modules/@react-native/gradle-plugin/build.gradle.kts"
          if [ -f "$TARGET_FILE" ]; then
            echo "Файл плагина найден. Отключаем allWarningsAsErrors..."
            sed -i 's/allWarningsAsErrors.set(true)/allWarningsAsErrors.set(false)/g' "$TARGET_FILE"
            sed -i 's/allWarningsAsErrors = true/allWarningsAsErrors = false/g' "$TARGET_FILE"
          fi

      - name: Build with Gradle
        run: |
          # Указываем правильный путь к React Native
          echo "reactNativePath=react-native-brain/node_modules/react-native" >> gradle.properties
          chmod +x gradlew
          
          # Запуск сборки с указанием явного пути к React Native
          ./gradlew assembleRelease \
            -PreactNativePath="react-native-brain/node_modules/react-native" \
            --no-daemon \
            --info
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MechPravdy-APK
          path: app/build/outputs/apk/release/*.apk
