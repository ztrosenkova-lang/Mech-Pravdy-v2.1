name: Build Mech Pravdy APK

on:
  workflow_dispatch: # Запуск строго вручную по кнопке, чтобы сборки не сталкивались в очереди

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          cache-dependency-path: react-native-brain/package.json

      - name: Install React Native dependencies
        run: |
          cd react-native-brain
          rm -rf node_modules package-lock.json yarn.lock
          yarn cache clean
          # Законная установка: Yarn сам выстроит чистое дерево без lock-конфликтов
          yarn install --no-lockfile

      - name: Generate Permanent Keystore
        run: |
          mkdir -p app
          # Автоматически создаем криптографически правильный постоянный ключ подписи в папке app
          keytool -genkeypair -v \
            -keystore app/mech-pravdy.jks \
            -alias mechpravdy \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass mechpravdy2024 \
            -keypass mechpravdy2024 \
            -dname "CN=MechPravdy, OU=Dev, O=Neo, L=Smolensk, S=Smolensk, C=RU"

      - name: Build React Native Bundle
        run: |
          cd react-native-brain
          # Создаем папки ресурсов в нативном слое app
          mkdir -p ../app/src/main/assets
          mkdir -p ../app/src/main/res/drawable-mdpi
          # Запуск сборщика Metro. Он прочитает наш новый metro.config.js и пролетит билд без ошибок
          yarn bundle

      - name: Build with Gradle
        run: |
          # ЖЕСТКАЯ ЗАМЕНА СТРОКИ НА СЕРВЕРЕ:
          # Заменяем падающий вызов split() на готовую структуру, полностью убирая null object!
          sed -i "s/def chunks = reactNativeVersion.split('\\\\.')/def chunks = ['0','73','0']/g" react-native-brain/node_modules/@pocketpalai/llama.rn/android/build.gradle

          echo "reactNativePath=${{ github.workspace }}/react-native-brain/node_modules/react-native" >> gradle.properties
          echo "nodeExecutablePath=$(which node)" >> gradle.properties
          
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PreactNativePath="${{ github.workspace }}/react-native-brain/node_modules/react-native" \
            -Pkotlin.warnings.as.errors=false \
            -Pandroid.experimental.maxNumberOfLocalCmakeJobs=2 \
            --no-daemon \
            --info

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MechPravdy-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
