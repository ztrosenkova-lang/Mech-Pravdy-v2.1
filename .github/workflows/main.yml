name: Build Mech Pravdy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin', cache: 'gradle'}
      - uses: actions/setup-node@v4
        with: {node-version: '18'}
        
      - run: yarn install --no-lockfile
      - name: Build Bundle & APK
        run: |
          # 1. Создаем папки ресурсов внутри папки app приложения
          mkdir -p app/src/main/assets
          
          # 2. Запуск сборщика Metro из корня проекта для упаковки оверлея
          ./node_modules/.bin/react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output app/src/main/assets/index.android.bundle \
            --assets-dest app/src/main/res
          
          # 3. ЗАВОДСКОЙ СТАНДАРТ СБОРКИ:
          # Переходим в нативную папку android, где теперь лежат абсолютно все файлы Gradle-обертки
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
      - uses: actions/upload-artifact@v4
        with: {name: MechPravdy-APK, path: app/build/outputs/apk/release/*.apk}
