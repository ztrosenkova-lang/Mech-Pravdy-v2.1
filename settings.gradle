pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
        maven { url "$rootDir/react-native-brain/node_modules/react-native/android" }
        maven { url "$rootDir/react-native-brain/node_modules/jsc-android/dist" }
    }
}

rootProject.name = "Mech-Pravdy-v2"

// Включаем твой нативный Android-чат
include ':app'

// ОФИЦИАЛЬНАЯ ИНСТРУКЦИЯ FACEBOOK ДЛЯ НАДСТРОЕК НАД ИСХОДНЫМ КОДОМ:
// Мы подгружаем родной скрипт автолинкинга и явно указываем ему, 
// что наш package.json и node_modules лежат внутри папки 'react-native-brain'!
apply from: new File(settingsDir, "react-native-brain/node_modules/@react-native/gradle-plugin/autolinking.gradle")

// Запускаем автолинкинг, передавая ему точный адрес JS-мозга.
// Этот метод САМ создаст проект :react-native, САМ пропишет ему версию 0.73.0,
// и движок Llama на строке 41 нативно прочитает все данные без единой ошибки!
autolinkLibrariesWithGradle({
    root = file("react-native-brain")
})
