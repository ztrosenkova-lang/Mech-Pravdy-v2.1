pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
        maven { url "$rootDir/react-native-brain/node_modules/react-native/android" }
        maven { url "$rootDir/react-native-brain/node_modules/jsc-android/dist" }
    }
}

rootProject.name = "Mech-Pravdy-v2"

// Включаем твой нативный Android-чат
include ':app'

// ОФИЦИАЛЬНЫЙ СЦЕНАРИЙ АВТОЛИНКИНГА FACEBOOK ДЛЯ СТРУКТУРЫ С ПОДПАПКОЙ:
// Node.js динамически вычислит точный путь к скрипту внутри react-native-brain и скормит его компилятору.
// Скрипт САМ зарегистрирует подпроект :react-native и :pocketpalai_llama.rn, убирая ошибку с методом split()!
apply from: new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, new File(settingsDir, 'react-native-brain')).text.trim(), "../../../@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesSettingsGradle(settingsDir, 'react-native-brain')
