plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.facebook.react'
}

react {
    root = file("../react-native-brain")
    reactNativeDir = file("../react-native-brain/node_modules/react-native")
    codegenDir = file("../react-native-brain/node_modules/@react-native/codegen")
    cliFile = file("../react-native-brain/node_modules/react-native/cli.js")
}

// Принудительное переопределение внутренних путей сборщика тасок
project.ext.react = [
    root: "../../", 
    bundleAssetName: "index.android.bundle",
    entryFile: "index.js",
    cliPath: "react-native-brain/node_modules/react-native/cli.js"
]

android {
    namespace 'com.mechpravdy.neo'
    
    compileSdkVersion = 34
    compileSdk = 34
    ndkVersion = "25.1.8937393"

    signingConfigs {
        release {
            storeFile file("mech-pravdy.jks")
            storePassword "mechpravdy2024"
            keyAlias "mechpravdy"
            keyPassword "mechpravdy2024"
        }
    }

    defaultConfig {
        applicationId "com.mechpravdy.neo"
        minSdk = 26
        
        targetSdkVersion = 34
        targetSdk = 34
        
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a"
        }

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared", 
                          "-DCMAKE_BUILD_TYPE=Release",
                          "-DNODE_ENV=production"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path file("../react-native-brain/node_modules/react-native/ReactAndroid/cmake-utils/default-app-setup/CMakeLists.txt")
        }
    }

    buildTypes {
        release {
            minifyEnabled true // Включает ProGuard/R8 для сжатия кода
            // Привязываем правила защиты кода
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Принудительно подписываем релиз нашим сгенерированным JKS ключом
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    aaptOptions {
        noCompress "bin", "gguf"
    }

    packagingOptions {
        pickFirst "lib/**/libc++_shared.so"
        pickFirst "lib/**/libfbjni.so"
        pickFirst "lib/**/libjscexecutor.so"
        pickFirst "lib/**/libhermes.so"
        
        exclude "META-INF/DEPENDENCIES"
        exclude "META-INF/LICENSE"
        exclude "META-INF/LICENSE.txt"
        exclude "META-INF/notice.txt"
        exclude "META-INF/NOTICE"
        exclude "META-INF/NOTICE.txt"
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.0.21"
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    
    // ML Kit
    implementation 'com.google.mlkit:text-recognition:16.0.0'
    implementation 'com.google.mlkit:text-recognition-chinese:16.0.0'

    // React Native 0.73.0 Бинарники
    implementation "com.facebook.react:react-android:0.73.0"
    implementation "com.facebook.react:hermes-android:0.73.0"
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0"
    implementation "com.facebook.fbjni:fbjni:0.3.0"
    implementation "com.facebook.soloader:soloader:0.10.5"
    
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}

// Полностью замени наш прошлый нижний блок в app/build.gradle на этот:
tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    kotlinOptions {
        verbose = true
        // Правильный синтаксис передачи аргументов для Kotlin плагина:
        freeCompilerArgs += ["-Xreport-output-files"]
    }
}

// Бронебойный вывод содержимого из скрытого HTML-отчета прямо в консоль Actions
gradle.taskGraph.afterTask { Task task, TaskState state ->
    if (state.failure && task.name.contains("compileReleaseKotlin")) {
        def reportFile = file("${project.buildDir}/reports/problems/problems-report.html")
        if (reportFile.exists()) {
            println("\n=== КРИТИЧЕСКИЙ ОТЧЕТ ОБ ОШИБКЕ ИЗ PROBLEMS-REPORT.HTML ===")
            // Читаем файл, убираем HTML-теги и выводим чистый текст ошибки в консоль
            println(reportFile.text.replaceAll("<[^>]*>", " ").replaceAll("\\s+", " ").trim())
            println("============================================================\n")
        }
    }
}
